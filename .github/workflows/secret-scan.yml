name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  env-check:
    name: Check No .env Files Committed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for .env files
        run: |
          if find . -name ".env" -not -name ".env.example" -not -path './.git/*' | grep -q .; then
            echo "ERROR: .env file found in repo!"
            find . -name ".env" -not -name ".env.example" -not -path './.git/*'
            exit 1
          fi
          echo "✓ No .env files found"

      - name: Scan for SQLite databases
        run: |
          if find . -name "*.sqlite" -o -name "*.sqlite3" -o -name "*.db" | grep -qv ".git"; then
            echo "ERROR: database file found in repo!"
            find . \( -name "*.sqlite" -o -name "*.sqlite3" -o -name "*.db" \) -not -path './.git/*'
            exit 1
          fi
          echo "✓ No database files found"
