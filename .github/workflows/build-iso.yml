name: Build ISO

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-iso:
    name: Build AI Nexus Installer ISO
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xorriso p7zip-full wget

      - name: Build ISO
        run: |
          chmod +x installer/build-iso.sh
          bash installer/build-iso.sh --version ${{ github.event.inputs.version }}

      - name: Generate checksums
        run: |
          cd installer
          sha256sum *.iso > SHA256SUMS
          cat SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-nexus-iso-${{ github.event.inputs.version }}
          path: |
            installer/*.iso
            installer/SHA256SUMS
          retention-days: 30
