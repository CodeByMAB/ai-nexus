# nginx config for api.YOURDOMAIN.COM
# Listening on both port 80 (for Cloudflare Tunnel) and 8002 (legacy)

server {
    listen 80;
    listen 8002;
    server_name api.YOURDOMAIN.COM;

    # Prevent port number from appearing in redirects
    port_in_redirect off;
    absolute_redirect off;

    # API Documentation at /docs
    location /docs {
        alias /var/www/api-docs;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header X-Debug "api-docs" always;
    }

    # Serve example scripts
    location /docs/examples {
        alias /var/www/api-docs/examples;
        autoindex on;
        add_header X-Debug "api-examples" always;
    }

    # Proxy all /v1/* requests to AI Gateway
    location /v1/ {
        proxy_pass http://127.0.0.1:5050/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header Authorization	   $http_authorization;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
        client_max_body_size 100M;
        proxy_buffering off;
        add_header X-Debug "ai-gateway-proxy" always;
    }

    # Root path - redirect to docs (relative redirect to avoid port issues)
    location = / {
        return 301 /docs;
    }

    # Catch-all for other paths - show them where to go
    location / {
        default_type application/json;
        return 200 '{"error":"Not found","endpoints":{"/docs":"API Documentation","/v1/*":"API Endpoints"}}\n';
        add_header Content-Type application/json;
    }
}
