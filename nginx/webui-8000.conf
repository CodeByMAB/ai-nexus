server {
    listen 8000;
    server_name _;

    # API Gateway - OpenAI-compatible API with authentication
    location /api/ {
        # Strip /api prefix and forward to gateway
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600;
        proxy_send_timeout 600;
        client_max_body_size 100M;
        proxy_buffering off;
        add_header X-Debug "ai-gateway-proxy" always;
    }

    # API Documentation
    location /api-docs {
        alias /var/www/api-docs;
        index index.html;
        add_header X-Debug "api-docs" always;
    }

    # Open WebUI
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        client_max_body_size 50M;
        proxy_buffering off;
        add_header X-Debug "webui-proxy" always;
    }
}
