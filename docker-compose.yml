version: '3.9'
# ============================================================
# AI Nexus — Root Orchestration
# Copy .env.example to .env before running.
# Run: docker compose up -d
# ============================================================

services:

  # ---- Web UI ----
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:${GATEWAY_PORT:-5050}/v1
      - OPENAI_API_KEY=placeholder
      - WEBUI_AUTH=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ---- Knowledge Graph ----
  neo4j:
    image: neo4j:5.26.0
    container_name: graphiti-neo4j
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD required}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

  graphiti:
    build:
      context: ./services/graphiti
      dockerfile: Dockerfile
    container_name: graphiti
    ports:
      - "127.0.0.1:${GRAPHITI_PORT:-8001}:8001"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?}
      - OPENAI_BASE_URL=http://host.docker.internal:${GATEWAY_PORT:-5050}/v1
      - OPENAI_API_KEY=${GATEWAY_API_KEY:-placeholder}
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ---- Agent Memory ----
  zep-postgres:
    image: ghcr.io/getzep/zep-postgres:latest
    container_name: zep-postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zep:
    image: ghcr.io/getzep/zep:latest
    container_name: zep
    ports:
      - "127.0.0.1:${ZEP_PORT:-8010}:8010"
    depends_on:
      zep-postgres:
        condition: service_healthy
    volumes:
      - ./services/zep/config.yaml:/app/config.yaml:ro
    environment:
      - ZEP_MEMORY_STORE_POSTGRES_DSN=postgres://postgres:${POSTGRES_PASSWORD}@zep-postgres:5432/zep
    restart: unless-stopped

  # ---- MCP Servers ----
  mcp-gateway:
    build:
      context: ./services/mcp-servers/nginx
    container_name: mcp-gateway
    ports:
      - "127.0.0.1:${MCP_GATEWAY_PORT:-8100}:80"
    restart: unless-stopped

volumes:
  openwebui_data:
  neo4j_data:
  neo4j_logs:
  postgres_data:
