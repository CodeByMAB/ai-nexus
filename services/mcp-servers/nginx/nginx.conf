events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=mcp_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=mcp_strict:10m rate=2r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=mcp_conn:10m;

    # Extract token from Authorization: Bearer <token>
    map $http_authorization $auth_bearer_token {
        default "";
        "~*^Bearer\\s+(.+)$" $1;
    }

    # Prefer X-API-Key when provided, otherwise use bearer token
    map $http_x_api_key $provided_api_key {
        default $http_x_api_key;
        "" $auth_bearer_token;
    }

    # Upstream definitions for each MCP server
    upstream dockerhub_mcp {
        server dockerhub-mcp:8000;
    }

    upstream graphiti_mcp {
        server graphiti:8000;
    }

    server {
        listen 80;
        server_name mcp.YOURDOMAIN.COM;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer" always;

        # Connection limit - max 5 concurrent connections per IP
        limit_conn mcp_conn 5;

        # Health check endpoint (no auth required, but rate limited)
        location /health {
            access_log off;
            limit_req zone=mcp_strict burst=5 nodelay;
            return 200 "MCP Gateway: OK\n";
            add_header Content-Type text/plain;
        }

        # Internal auth check against main gateway token validator path.
        # This ensures MCP accepts any active software-issued pg_ key.
        location = /_auth/validate {
            internal;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-API-Key $http_x_api_key;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_pass http://host.docker.internal:5050/internal/auth/validate;
        }

        location @mcp_unauthorized {
            return 401 '{"error":"Unauthorized - provide X-API-Key or Authorization: Bearer <key>"}';
            add_header Content-Type application/json;
        }

        # Docker Hub MCP Server
        location /dockerhub/ {
            auth_request /_auth/validate;
            error_page 401 403 = @mcp_unauthorized;

            # Rate limiting - 10 requests/sec, burst up to 20
            limit_req zone=mcp_limit burst=20 nodelay;

            proxy_pass http://dockerhub_mcp/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE/Streaming support
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400;
        }

        # Graphiti MCP Server (existing)
        location /graphiti/ {
            auth_request /_auth/validate;
            error_page 401 403 = @mcp_unauthorized;

            # Stricter rate limiting for knowledge graph - 2 requests/sec
            limit_req zone=mcp_strict burst=5 nodelay;

            proxy_pass http://graphiti_mcp/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE/Streaming support
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400;
        }

        # List available MCP servers
        location = / {
            return 200 '{"mcp_gateway":"active","servers":["/dockerhub","/graphiti"],"health":"/health","port":"8100"}';
            add_header Content-Type application/json;
        }

        # 404 for unknown routes
        location / {
            return 404 '{"error":"MCP server not found","available_servers":["/dockerhub","/graphiti"]}';
            add_header Content-Type application/json;
        }
    }
}
