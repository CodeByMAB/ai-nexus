# nginx configuration for Payment Webhook Service
# Add this to the existing api-subdomain.conf server block

# Payment Webhook Routes (add to api.YOURDOMAIN.COM server block on port 8002)

# Stripe webhooks (public, HTTPS via Cloudflare)
location /webhooks/stripe {
    proxy_pass http://127.0.0.1:8003/webhooks/stripe;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60;
    proxy_send_timeout 60;
    client_max_body_size 1M;
}

# Strike webhooks (public, HTTPS via Cloudflare)
location /webhooks/strike {
    proxy_pass http://127.0.0.1:8003/webhooks/strike;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60;
    proxy_send_timeout 60;
    client_max_body_size 1M;
}

# BTCPay webhooks (optional - can be LAN-only if needed)
location /webhooks/btcpay {
    # Uncomment to restrict to LAN only:
    # allow 192.168.50.0/24;
    # deny all;

    proxy_pass http://127.0.0.1:8003/webhooks/btcpay;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60;
    proxy_send_timeout 60;
    client_max_body_size 1M;
}

# Payment API endpoints (for sign-up website)
location /api/create-payment {
    proxy_pass http://127.0.0.1:8003/api/create-payment;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/promo/ {
    proxy_pass http://127.0.0.1:8003/api/promo/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api/subscription/ {
    proxy_pass http://127.0.0.1:8003/api/subscription/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Health check (optional, can be internal only)
location /webhooks/health {
    proxy_pass http://127.0.0.1:8003/health;
    proxy_http_version 1.1;
    access_log off;
}
